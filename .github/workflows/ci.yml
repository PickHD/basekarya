name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: test-secret-key
      SUPERADMIN_USERNAME: superadmin
      SUPERADMIN_PASSWORD: testpassword123

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          working-directory: backend
          version: latest

      - name: Run tests with coverage
        run: |
          go test ./... -cover -coverprofile=coverage.out -count=1
          go tool cover -func=coverage.out

      - name: Coverage summary
        run: |
          echo "## Backend Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=coverage.out >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.out

      - name: Fix coverage paths for Qlty
        run: sed -i 's|^basekarya-backend/|backend/|' coverage.out

      - name: Publish backend coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        if: always()
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: backend/coverage.out
          strip-prefix: /home/runner/work/basekarya/basekarya/

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Run tests with coverage
        run: pnpm test:coverage

      - name: Fix coverage paths
        run: sed -i 's|^SF:src/|SF:frontend/src/|' coverage/lcov.info

      - name: Coverage summary
        run: |
          echo "## Frontend Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat coverage/index.html >> /dev/null 2>&1 || true
          echo 'Coverage report generated in artifacts' >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Publish frontend coverage to Qlty
        uses: qltysh/qlty-action/coverage@v2
        if: always()
        with:
          token: ${{ secrets.QLTY_COVERAGE_TOKEN }}
          files: frontend/coverage/lcov.info
          strip-prefix: /home/runner/work/basekarya/basekarya/
