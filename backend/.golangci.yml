version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - unused
      - path: mocks_test\.go
        linters:
          - unused
    paths:
      - internal/testutil

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
