version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    paths:
      - internal/testutil

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
