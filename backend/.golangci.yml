version: "2"

run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign

formatters:
  enable:
    - gofmt

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
  exclude-dirs:
    - internal/testutil
  exclusions:
    generated: lax
    presets:
      - comments
      - std-error-handling
    rules:
      - path: mocks_test\.go
        linters:
          - unused
